name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install VSCode extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Build release artifacts
        working-directory: vscode-extension
        run: npm run release:local

      - name: Remove existing release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          release_id="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
            | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s).id));" \
            || true)"

          if [ -n "$release_id" ]; then
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          make_latest: true
          files: |
            releases/UnityDllBridge-VSCode-*.vsix
            releases/UnityDllBridge-Templates-*.zip
            releases/UnityDllBridge-UnityPlugin-*.zip
            releases/README-offline-install.md
            releases/checksums.txt
          body: |
            ## Unity DLL Bridge ${{ steps.release_tag.outputs.tag }}

            Unity DLL Bridge 正式版，用于在 VSCode 中完成 Unity 外部 C# 工程的 DLL 构建、诊断与同步。

            离线环境请下载 `UnityDllBridge-VSCode-*.vsix` 安装 VSCode 扩展。

            同时可下载：

            - `UnityDllBridge-UnityPlugin-*.zip`
            - `UnityDllBridge-Templates-*.zip`
            - `README-offline-install.md`
            - `checksums.txt`
